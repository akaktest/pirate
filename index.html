<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>OceanView Hotel Pro+</title>

<style>
body { margin:0; font-family:Arial; background:#f5f5f5; }

nav {
  background:#222; color:white; padding:15px;
  display:flex; justify-content:space-between;
}

nav a { color:white; margin:0 10px; text-decoration:none; }

.hero {
  background:#1e1e1e; color:white; text-align:center;
  padding:80px 20px;
}

section { padding:40px; text-align:center; }

.grid { display:flex; flex-wrap:wrap; justify-content:center; gap:15px; }

.card {
  background:white; padding:15px; width:250px;
  border-radius:10px; box-shadow:0 2px 8px rgba(0,0,0,0.1);
}

img { width:100%; border-radius:10px; }

button {
  padding:10px; background:#222; color:white;
  border:none; cursor:pointer; margin-top:10px;
}

input { padding:8px; margin:5px; width:200px; }

/* Slider */
.slider img { width:80%; max-width:600px; display:none; margin:auto; }
.slider img.active { display:block; }

/* Reviews */
.review-box {
  background:white; padding:10px; margin:10px;
  border-radius:8px;
}

/* Taxi box */
.taxi-box {
  background:white;
  padding:20px;
  border-radius:10px;
  display:inline-block;
  box-shadow:0 2px 8px rgba(0,0,0,0.1);
}
</style>

</head>
<body>

<!-- NAV -->
<nav>
  <div>OceanView Pro+</div>
  <div>
    <a href="#menu">Menu</a>
    <a href="#gallery">Gallery</a>
    <a href="#reviews">Reviews</a>
    <a href="#taxi">Taxi</a>
    <a href="#admin">Admin</a>
  </div>
</nav>

<!-- HERO -->
<div class="hero">
  <h1>Luxury Hotel & Restaurant</h1>
  <p>Book | Eat | Travel Easy 🚖</p>
</div>

<!-- MENU -->
<section id="menu">
<h2>Food Menu</h2>

<div class="grid">
  <div class="card">
    <h3>Pizza</h3>
    <p>$12</p>
    <button onclick="order('Pizza')">Order Now</button>
  </div>

  <div class="card">
    <h3>Burger</h3>
    <p>$10</p>
    <button onclick="order('Burger')">Order Now</button>
  </div>

  <div class="card">
    <h3>Pasta</h3>
    <p>$11</p>
    <button onclick="order('Pasta')">Order Now</button>
  </div>
</div>
</section>

<!-- GALLERY -->
<section id="gallery">
<h2>Gallery</h2>

<div class="slider">
  <img class="active" src="https://images.unsplash.com/photo-1501117716987-c8e1ecb2108f">
  <img src="https://images.unsplash.com/photo-1505693416388-ac5ce068fe85">
  <img src="https://images.unsplash.com/photo-1550547660-d9450f859349">
</div>

<button onclick="nextSlide()">Next Image</button>
</section>

<!-- REVIEWS -->
<section id="reviews">
<h2>Guest Reviews ⭐</h2>

<div id="reviewList"></div>

<input id="name" placeholder="Your Name"><br>
<input id="review" placeholder="Your Review"><br>
<button onclick="addReview()">Submit Review</button>
</section>

<!-- TAXI SERVICE -->
<section id="taxi">
<h2>🚖 Call Taxi Service</h2>

<div class="taxi-box">
  <p>Need a ride from the hotel?</p>

  <input id="pickup" placeholder="Pickup Location"><br>
  <input id="drop" placeholder="Drop Location"><br>

  <button onclick="callTaxi()">Book Taxi</button>

  <p id="taxiMsg"></p>
</div>
</section>

<!-- ADMIN -->
<section id="admin">
<h2>Admin Panel (Demo)</h2>

<input id="item" placeholder="New Menu Item">
<button onclick="addItem()">Add Item</button>

<div id="menuList"></div>
</section>

<script>

// ORDER (demo)
function order(item){
  alert("Order placed for: " + item + " (Demo only)");
}

// SLIDER
let index = 0;
function nextSlide(){
  let imgs = document.querySelectorAll(".slider img");
  imgs[index].classList.remove("active");
  index = (index + 1) % imgs.length;
  imgs[index].classList.add("active");
}

// REVIEWS
function addReview(){
  let name = document.getElementById("name").value;
  let review = document.getElementById("review").value;

  let div = document.createElement("div");
  div.className = "review-box";
  div.innerHTML = "<b>"+name+"</b><p>"+review+"</p>";

  document.getElementById("reviewList").appendChild(div);

  localStorage.setItem("reviews", document.getElementById("reviewList").innerHTML);
}

window.onload = function(){
  document.getElementById("reviewList").innerHTML =
  localStorage.getItem("reviews") || "";
}

// ADMIN
function addItem(){
  let item = document.getElementById("item").value;

  let div = document.createElement("div");
  div.className = "card";
  div.innerHTML = "<h3>"+item+"</h3><p>$15</p>";

  document.getElementById("menuList").appendChild(div);
}

// TAXI SERVICE
function callTaxi(){
  let pickup = document.getElementById("pickup").value;
  let drop = document.getElementById("drop").value;

  if(pickup === "" || drop === ""){
    document.getElementById("taxiMsg").innerText =
    "Please enter both locations.";
    return;
  }

  document.getElementById("taxiMsg").innerText =
  "🚖 Taxi booked from " + pickup + " to " + drop + " (Demo booking)";
}

</script>

</body>
</html>
